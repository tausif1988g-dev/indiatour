<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ea580c"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
  </defs>
  <!-- Outer circle -->
  <circle cx="24" cy="24" r="24" fill="url(#bgGrad)"/>
  <!-- Taj Mahal silhouette (simplified) -->
  <!-- Main dome -->
  <ellipse cx="24" cy="17" rx="5" ry="6" fill="white" opacity="0.95"/>
  <!-- Finial on top -->
  <line x1="24" y1="10" x2="24" y2="12" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Main arch / iwan -->
  <rect x="19" y="21" width="10" height="10" rx="5 5 0 0" fill="white" opacity="0.95"/>
  <!-- Left minaret -->
  <rect x="11" y="20" width="4" height="11" rx="2" fill="white" opacity="0.9"/>
  <ellipse cx="13" cy="19" rx="2.5" ry="2" fill="white" opacity="0.9"/>
  <!-- Right minaret -->
  <rect x="33" y="20" width="4" height="11" rx="2" fill="white" opacity="0.9"/>
  <ellipse cx="35" cy="19" rx="2.5" ry="2" fill="white" opacity="0.9"/>
  <!-- Base platform -->
  <rect x="9" y="31" width="30" height="3" rx="1.5" fill="white" opacity="0.85"/>
  <!-- Pool reflection line -->
  <rect x="14" y="35" width="20" height="1.5" rx="0.75" fill="white" opacity="0.5"/>
</svg>
